name: Build Mobile App

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Website URL to convert (e.g. https://example.com)'
        required: true
        default: 'https://example.com'
      app_name:
        description: 'App Name'
        required: true
        default: 'My Web App'
      logo_url:
        description: 'Direct URL to your app logo (PNG format, ideally 512x512 or larger)'
        required: false
        default: ''

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Project Dependencies
        run: npm install

      - name: Initialize & Configure Capacitor
        run: |
          # Ensure the web-dir exists so Capacitor doesn't throw an error
          mkdir -p public
          touch public/index.html
          
          npx cap init "${{ github.event.inputs.app_name }}" "com.web2apk.app" --web-dir public
          npx cap add android
          
          # Inject target URL into capacitor.config.json
          node -e '
            const fs = require("fs");
            const config = JSON.parse(fs.readFileSync("capacitor.config.json", "utf8"));
            config.server = { url: "${{ github.event.inputs.web_url }}", cleartext: true };
            fs.writeFileSync("capacitor.config.json", JSON.stringify(config, null, 2));
          '

      - name: Generate App Icon & Splash Screen
        if: github.event.inputs.logo_url != ''
        run: |
          # Install Capacitor Assets generator
          npm install -D @capacitor/assets
          mkdir -p assets
          
          # Download the provided logo URL and save it as the source for icons/splash
          curl -L "${{ github.event.inputs.logo_url }}" -o assets/icon.png
          curl -L "${{ github.event.inputs.logo_url }}" -o assets/splash.png
          
          # Automatically resize and inject the icons into the Android project
          npx @capacitor/assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Display Custom Signature
        run: |
          # Displays your custom message on the GitHub Actions summary page
          echo "### 🎉 Successfully built ${{ github.event.inputs.app_name }} APK!" >> $GITHUB_STEP_SUMMARY
          echo "#### Made with ❤️ by Susmit" >> $GITHUB_STEP_SUMMARY
