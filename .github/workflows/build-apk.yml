name: Build Mobile App

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Website URL to convert (e.g. https://example.com)'
        required: true
        default: 'https://example.com'
      app_name:
        description: 'App Name'
        required: true
        default: 'My Web App'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Project Dependencies
        run: npm install

      - name: Initialize & Configure Capacitor
        run: |
          npx cap init "${{ github.event.inputs.app_name }}" "com.web2apk.app" --web-dir public
          npx cap add android
          
          # Inject target URL into capacitor.config.json
          node -e '
            const fs = require("fs");
            const config = JSON.parse(fs.readFileSync("capacitor.config.json", "utf8"));
            config.server = { url: "${{ github.event.inputs.web_url }}", cleartext: true };
            fs.writeFileSync("capacitor.config.json", JSON.stringify(config, null, 2));
          '
          
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
